# ─────────────────────────────────────────────────────────────────────────────
# Qwen3-TTS 0.6B — Hindi Finetuning Config
# Target: Apple Silicon M5 Pro 64GB via MLX
# ─────────────────────────────────────────────────────────────────────────────

model:
  model_id: "mlx-community/Qwen3-TTS-12Hz-0.6B-Base-8bit"
  tokenizer_id: "Qwen/Qwen3-TTS-Tokenizer-12Hz"
  model_type: "qwen3_tts"
  # Register new language token IDs into unused codec embedding slots (2051–2147).
  # Add your language here and set lang_code (under trainer:) to the same key.
  custom_lang_ids:
    hi: 2051   # Hindi

lora:
  rank: 8
  alpha: 16.0
  dropout: 0.05
  # Layers to adapt — attention + MLP for best Hindi phoneme learning
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  train_jsonl: "./data/hindi/train_codes.jsonl"
  val_jsonl:   "./data/hindi/val_codes.jsonl"
  target_sr: 24000
  min_duration: 1.0     # seconds — skip very short clips
  max_duration: 15.0    # seconds — skip very long clips
  normalize: true
  trim: true
  max_samples: null     # set to e.g. 500 for quick test run

trainer:
  output_dir: "./checkpoints/qwen3-hindi"
  run_name: "qwen3-0.6b-hindi-lora-r8"

  # Training duration
  num_epochs: 15
  max_steps: null

  # batch_size=2 keeps Metal buffer pressure low on M-series GPUs.
  # Try batch_size=4 / grad_accumulation=8 if your chip has headroom —
  # same effective batch (32) but half the mini-batch iterations per step.
  batch_size: 2
  grad_accumulation: 16       # effective batch = 32 (same as before)

  # Optimizer
  learning_rate: 2.0e-5   # official full-FT uses 2e-6; LoRA can use a bit higher
  weight_decay: 0.01
  grad_clip: 1.0

  # LR warmup + cosine decay
  warmup_steps: 50
  lr_schedule: "cosine"

  # Checkpointing — less frequent = less disk I/O blocking the GPU
  save_every_n_steps: 200
  save_every_n_epochs: 1
  keep_last_n: 3

  # Validation — was 50, now 100 to halve validation overhead
  eval_every_n_steps: 100
  val_batches: 10

  # Logging — was 5, now 10; high-frequency console I/O is surprisingly costly
  log_every_n_steps: 10
  log_file: "./checkpoints/qwen3-hindi/train_log.jsonl"

  # Data loading — sort batches by codec length to minimise padding waste;
  # prefetch 2 batches in a background thread to overlap CPU I/O with GPU.
  sort_by_length: true
  prefetch: 2

  label_smoothing: 0.1    # helps with Hindi character diversity

  # Language token injected into the codec prefix during training (matches inference).
  # Hindi is not in codec_language_id, so "auto" uses the nothink path (no language token).
  # This aligns training with inference so the model sees the same prefix conditioning.
  lang_code: "hi"

processor:
  max_text_len: 256
  max_codec_len: 1200     # ~100s at 12Hz, covers all Hindi training clips
  speaker_name: "hindi_speaker"
